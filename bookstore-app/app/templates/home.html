<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookstore Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📚 My Bookstore</h1>
            <p>Manage your collection of books with ease!</p>
            <a href="{{ url_for('main.add_book_form') }}" class="btn add-btn">➕ Add New Book</a>

            <!-- Search & Filter Form -->
            <form action="{{ url_for('main.search_books') }}" method="get" class="search-form">
                <input type="text" name="query" placeholder="Search books..." value="{{ query or '' }}">
                <select name="filter">
                    <option value="title" {% if filter_by == 'title' %}selected{% endif %}>Title</option>
                    <option value="category" {% if filter_by == 'category' %}selected{% endif %}>Category</option>
                    <option value="year" {% if filter_by == 'year' %}selected{% endif %}>Year</option>
                </select>
                <button type="submit" class="btn search-btn">🔍 Search</button>
            </form>
        </header>

        <div class="book-list">
            {% for book in books %}
            <div class="book-card">
                <h2>{{ book['title'] }}</h2>
                <p><strong>Author:</strong> {{ book['author']['firstName'] }} {{ book['author']['lastName'] }}</p>
                <p><strong>Year:</strong> {{ book['year'] }}</p>
                <p><strong>Category:</strong> {{ book['category'] }}</p>
                <div class="actions">
                    <a href="{{ url_for('main.manage_book', id=book['_id']) }}" class="btn view-btn">👁️ View</a>
                    <a href="{{ url_for('main.edit_book', id=book['_id']) }}" class="btn edit-btn">✏️ Edit</a>
                    <button class="btn delete-btn" data-id="{{ book['_id'] }}">🗑️ Delete</button>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        document.querySelectorAll('.delete-btn').forEach(button => {
            button.addEventListener('click', function () {
                const bookId = this.dataset.id;
                if (confirm('Are you sure you want to delete this book?')) {
                    fetch(`/book/${bookId}`, { method: 'DELETE' })
                        .then(response => {
                            if (response.ok) {
                                alert('Book deleted successfully!');
                                location.reload();
                            } else {
                                alert('Failed to delete the book.');
                            }
                        });
                }
            });
        });
    </script>
</body>
</html>
