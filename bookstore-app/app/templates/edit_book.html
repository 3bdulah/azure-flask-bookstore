<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Book</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="edit-container">
        <h1>Edit Book</h1>
        <form method="POST" action="{{ url_for('main.edit_book', id=book['_id']) }}" class="form">
            <div class="form-group">
                <label for="title">Title:</label>
                <input type="text" id="title" name="title" value="{{ book['title'] }}" required>
            </div>

            <div class="form-group">
                <label for="isbn">ISBN:</label>
                <input type="text" id="isbn" name="isbn" value="{{ book['isbn'] }}">
            </div>

            <div class="form-group">
                <label for="year">Year:</label>
                <input type="number" id="year" name="year" value="{{ book['year'] }}">
            </div>

            <div class="form-group">
                <label for="price">Price:</label>
                <input type="number" id="price" name="price" value="{{ book['price'] }}" step="0.01">
            </div>

            <div class="form-group">
                <label for="page">Pages:</label>
                <input type="number" id="page" name="page" value="{{ book['page'] }}">
            </div>

            <div class="form-group">
                <label for="category">Category:</label>
                <input type="text" id="category" name="category" value="{{ book['category'] }}">
            </div>

            <div class="form-group">
                <label for="publisherId">Publisher ID:</label>
                <input type="text" id="publisherId" name="publisherId" value="{{ book['publisher']['id'] }}">
            </div>

            <div class="form-group">
                <label for="publisherName">Publisher Name:</label>
                <input type="text" id="publisherName" name="publisherName" value="{{ book['publisher']['name'] }}">
            </div>

            <div class="form-group">
                <label for="authorIdentityNo">Author Identity No:</label>
                <input type="text" id="authorIdentityNo" name="authorIdentityNo" value="{{ book['author']['identityNo'] }}">
            </div>

            <div class="form-group">
                <label for="authorFirstName">Author's First Name:</label>
                <input type="text" id="authorFirstName" name="authorFirstName" value="{{ book['author']['firstName'] }}">
            </div>

            <div class="form-group">
                <label for="authorLastName">Author's Last Name:</label>
                <input type="text" id="authorLastName" name="authorLastName" value="{{ book['author']['lastName'] }}">
            </div>

            <div class="form-buttons">
                <button type="submit" class="btn-save">Save Changes</button>
                <a href="{{ url_for('main.index') }}" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
